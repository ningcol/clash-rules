name: Check rules

# PR / push 验证：lint 手工文件、跑单测、干跑一次完整构建（验证所有源可拉取、
# 可解析、可构建）。不发布。发布由 publish.yml 负责。
on:
  pull_request:
  push:
    branches: [main]
    # 只在影响构建的输入变动时触发，避免旧管线每日往 main 提交 final_*.yaml 时空跑。
    paths:
      - 'config.yaml'
      - 'scripts/**'
      - 'manual/**'
      - 'tests/**'
      - 'README.md'
      - '.github/workflows/check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Lint manual files
        run: python scripts/build.py lint

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: README subscription table in sync
        run: python scripts/build.py readme --check

      - name: Dry-run build (validates all sources + build pipeline)
        run: python scripts/build.py build --out dist --dry-run

      - name: Upload built rules
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: ignore

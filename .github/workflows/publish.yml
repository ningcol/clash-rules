name: Publish rules

# 触发：每天 UTC 21:00（北京 05:00）定时 / 影响产物的输入 push 到 main / 手动。
# 完整构建 → 数量骤降闸门 → 发布到 release 分支（普通 commit 保留历史）。
# 闸门失败则不发布，上一版留存。
on:
  schedule:
    - cron: "0 21 * * *"
  # 改动影响产物的输入（config / manual / build 脚本）push 到 main 即自动发布。
  # 只推 release 分支、且限定 branches: [main]，故 release 的自动提交不会反触发本流程。
  push:
    branches: [main]
    paths:
      - 'config.yaml'
      - 'manual/**'
      - 'scripts/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Lint + tests
        run: |
          python scripts/build.py lint
          python -m unittest discover -s tests

      - name: Prepare release worktree
        run: |
          # 用 ls-remote 查远端是否已有 release（不依赖本地 remote-tracking ref），
          # 并用显式 refspec 拉取，确保 refs/remotes/origin/release 被填充。
          if git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            git fetch origin +refs/heads/release:refs/remotes/origin/release
            git worktree add -B release release origin/release
          else
            # 首次：创建空的孤儿 release 分支
            git worktree add --detach release
            git -C release checkout --orphan release
            git -C release rm -rf --quiet . || true
          fi

      - name: Build (gate compares against previous release)
        run: |
          # build 会自动把 commit-msg.txt 写进 --out 目录（供下面 commit 用）
          python scripts/build.py build --out dist --previous release

      - name: Publish to release branch
        run: |
          find release -maxdepth 1 -name 'final_*' -delete
          cp dist/final_* release/
          cd release
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -F ../dist/commit-msg.txt
          git push origin release
